<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxShield | Secure Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #D4A843;
            --primary-dark: #B8860B;
            --bg: #F5F3EC;
            --card-bg: rgba(255, 255, 255, 0.7);
            --text: #1A1A1A;
            --border: rgba(255, 255, 255, 0.5);
            --gold-glow: rgba(212, 168, 67, 0.25);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(212, 168, 67, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(212, 168, 67, 0.15) 0%, transparent 40%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 50px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1), 0 0 30px var(--gold-glow);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            margin-bottom: 35px;
        }

        .logo-icon {
            font-size: 50px;
            color: var(--primary);
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px var(--gold-glow));
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -1px;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 18px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid var(--border);
            padding: 15px 15px 15px 50px;
            border-radius: 16px;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 20px var(--gold-glow);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 10px 20px var(--gold-glow);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px var(--gold-glow);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #error-msg {
            color: #e74c3c;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area">
            <i class="fa-solid fa-shield-halved logo-icon"></i>
            <h1>VOXSHIELD AI</h1>
        </div>

        <div id="error-msg">Invalid Credentials access denied.</div>

        <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="username" placeholder="Admin Username">
        </div>
        
        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Access Password">
        </div>

        <button class="login-btn" onclick="handleLogin()">
            SECURE ACCESS <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>
        </button>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');

            // Secure simulated auth
            if(user === 'admin' && pass === 'voxshield2026') {
                localStorage.setItem('voxshield_auth', 'authenticated_session_' + Date.now());
                window.location.href = 'index.html';
            } else {
                error.style.display = 'block';
                // Shake animation for premium feel
                document.querySelector('.login-card').animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
            }
        }

        // Auto redirect if already logged in
        if(localStorage.getItem('voxshield_auth')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
